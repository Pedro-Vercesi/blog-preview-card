<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Blog preview card</title>
  </head>
  <body>
    <div class="card flex-col">
      <img src="/assets/images/illustration-article.svg" alt="" />
      <div class="card-content flex-col">
        <div class="tag text-preset-3-bold">Learning</div>
        <p class="published text-preset-3">Published 21 Dec 2023</p>
        <p class="title text-preset-1">HTML & CSS foundation</p>
        <p class="paragraph text-preset-2">
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>
      <div class="author flex-row">
        <img
          src="/assets/images/image-avatar.webp"
          alt="Greg Hopper's avatar"
        />
        <p class="text-preset-3-bold">Greg Hopper</p>
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer>
  </body>
</html>
